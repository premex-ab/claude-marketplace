name: Sync android/skills

on:
  schedule:
    - cron: '17 3 * * *'  # Daily at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-android-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PREMEX_POT_APP_ID }}
          private-key: ${{ secrets.PREMEX_POT_APP_SECRET }}

      - name: Checkout marketplace repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install script dependencies
        run: pip install pyyaml

      - name: Clone upstream android/skills
        run: |
          git clone --depth 1 https://github.com/android/skills.git /tmp/upstream
          cd /tmp/upstream
          echo "UPSTREAM_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "UPSTREAM_SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Generate per-skill plugins and regenerate marketplace.json
        run: python3 .github/scripts/sync_android_skills.py

      - name: Validate marketplace, manifests, and skill frontmatter
        run: |
          set -euo pipefail
          python3 -c "import json, sys; json.load(open(sys.argv[1]))" .claude-plugin/marketplace.json
          find plugins -name "plugin.json" -print0 | while IFS= read -r -d '' f; do
            python3 -c "import json, sys; json.load(open(sys.argv[1]))" "$f"
          done
          find plugins -name "SKILL.md" -print0 | while IFS= read -r -d '' f; do
            head -1 "$f" | grep -q "^---" || { echo "ERROR: $f missing frontmatter"; exit 1; }
          done

      - name: Create or update pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: bot/sync-android-skills
          delete-branch: true
          commit-message: "chore(android-skills): sync upstream@${{ env.UPSTREAM_SHORT_SHA }}"
          title: "chore(android-skills): sync upstream@${{ env.UPSTREAM_SHORT_SHA }}"
          body: |
            Automated sync from [android/skills@${{ env.UPSTREAM_SHORT_SHA }}](https://github.com/android/skills/commit/${{ env.UPSTREAM_SHA }}).

            Per-skill plugins regenerated; `marketplace.json` updated to match. The sync workflow validated every SKILL.md and plugin.json before opening this PR — merging publishes the update.
          labels: |
            automated-sync
            android-skills

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
